<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SAFE Security Operations{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='soc-dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/netguard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/safe-ui.css') }}">
  <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
</head>
<body class="soc-shell">
  <div class="soc-app">
    {% include "soc/partials/sidebar.html" %}
    <main class="soc-main">
      {% include "soc/partials/topbar.html" %}
      <section class="soc-page">
        <div class="soc-preview-banner">
          <span class="soc-preview-banner-kicker">SOC Workspace</span>
          <span class="soc-preview-banner-copy">SAFE Console prioritizes the next decision: risk, affected host, security activity, and recommended action.</span>
        </div>
        {% block page %}{% endblock %}
      </section>
    </main>
  </div>
  <script src="{{ url_for('static', filename='js/netguard-ui.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
