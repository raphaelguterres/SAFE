<header class="safe-client-topbar safe-app-topbar">

    <span class="safe-client-mark">S</span>
    <span>
      <strong>SAFE</strong>
      <small>{{ tenant_name|default("Client Security Overview") }}</small>
    </span>
  </a>
  <nav class="safe-client-mode" aria-label="Client navigation">

    <a href="/app/assets">Assets</a>
    <a href="/app/incidents">Incidents</a>
  </nav>
  <div class="safe-client-actions" data-theme-slot>
    <a href="/app/reports">Reports</a>
  </div>
</header>
