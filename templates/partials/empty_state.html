{% macro empty_state(title, body, cta_label='', cta_href='') -%}
  <section class="empty-state">
    <p class="eyebrow">SAFE Console</p>
    <h2>{{ title }}</h2>
    <p>{{ body }}</p>
    {% if cta_label and cta_href %}
      <a class="btn btn-primary" href="{{ cta_href }}">{{ cta_label }}</a>
    {% endif %}
  </section>
{%- endmacro %}
